{% extends 'base.html' %}

{% block title %}Contato - StockBot{% endblock %}

{% block content %}
<div class="mx-auto max-w-4xl space-y-8">

    <!-- HEADER -->
    <div class="text-center">

        <h1 class="text-4xl font-bold text-sand-900">
            Entre em contato
        </h1>

        <p class="mt-3 text-sand-500">
            Precisa de ajuda? Fale com nossa equipe.
        </p>

    </div>

    <!-- FORM -->
    <div class="rounded-3xl border border-sand-100 bg-white p-8 shadow-sm">

        <form class="space-y-6">

            <!-- GRID -->
            <div class="grid gap-6 md:grid-cols-2">

                <div>

                    <label class="mb-2 block text-sm font-medium text-sand-700">
                        Nome
                    </label>

                    <input
                        type="text"
                        class="
                            w-full rounded-xl border border-sand-200
                            px-4 py-3 outline-none
                            transition-all
                            focus:border-stone-500
                        "
                    >

                </div>

                <div>

                    <label class="mb-2 block text-sm font-medium text-sand-700">
                        Email
                    </label>

                    <input
                        type="email"
                        class="
                            w-full rounded-xl border border-sand-200
                            px-4 py-3 outline-none
                            transition-all
                            focus:border-stone-500
                        "
                    >

                </div>

            </div>

            <!-- SUBJECT -->
            <div>

                <label class="mb-2 block text-sm font-medium text-sand-700">
                    Assunto
                </label>

                <input
                    type="text"
                    class="
                        w-full rounded-xl border border-sand-200
                        px-4 py-3 outline-none
                        transition-all
                        focus:border-stone-500
                    "
                >

            </div>

            <!-- MESSAGE -->
            <div>

                <label class="mb-2 block text-sm font-medium text-sand-700">
                    Mensagem
                </label>

                <textarea
                    rows="6"
                    class="
                        w-full rounded-xl border border-sand-200
                        px-4 py-3 outline-none
                        transition-all
                        focus:border-stone-500
                    "
                ></textarea>

            </div>

            <!-- BUTTON -->
            <button
                type="submit"
                class="
                    inline-flex items-center gap-2
                    rounded-xl bg-stone-700
                    px-6 py-3
                    text-sm font-medium text-white
                    transition-all hover:bg-stone-800
                "
            >

                <ion-icon name="send"></ion-icon>

                Enviar mensagem

            </button>

        </form>

    </div>

</div>
{% endblock %}
