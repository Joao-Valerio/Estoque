{% extends 'base.html' %}

{% block title %}Configurações - StockBot{% endblock %}

{% block content %}
<div class="space-y-8">

    <!-- HEADER -->
    <div>

        <h1 class="text-3xl font-bold text-sand-900">
            Configurações
        </h1>

        <p class="mt-1 text-sm text-sand-500">
            Ajuste preferências do sistema.
        </p>

    </div>

    <!-- SETTINGS -->
    <div class="grid gap-6 xl:grid-cols-2">

        <!-- CARD -->
        <div class="rounded-2xl border border-sand-100 bg-white p-6 shadow-sm">

            <div class="flex items-center gap-3">

                <div class="rounded-xl bg-stone-100 p-3">

                    <ion-icon
                        name="person"
                        class="text-xl text-stone-700"
                    ></ion-icon>

                </div>

                <div>

                    <h2 class="font-semibold text-sand-900">
                        Perfil
                    </h2>

                    <p class="text-sm text-sand-500">
                        Informações da conta
                    </p>

                </div>

            </div>

            <div class="mt-6 space-y-4">

                <input
                    type="text"
                    placeholder="Nome"
                    class="
                        w-full rounded-xl border border-sand-200
                        px-4 py-3 outline-none
                        focus:border-stone-500
                    "
                >

                <input
                    type="email"
                    placeholder="Email"
                    class="
                        w-full rounded-xl border border-sand-200
                        px-4 py-3 outline-none
                        focus:border-stone-500
                    "
                >

            </div>

        </div>

        <!-- CARD -->
        <div class="rounded-2xl border border-sand-100 bg-white p-6 shadow-sm">

            <div class="flex items-center gap-3">

                <div class="rounded-xl bg-blue-100 p-3">

                    <ion-icon
                        name="settings"
                        class="text-xl text-blue-600"
                    ></ion-icon>

                </div>

                <div>

                    <h2 class="font-semibold text-sand-900">
                        Sistema
                    </h2>

                    <p class="text-sm text-sand-500">
                        Preferências gerais
                    </p>

                </div>

            </div>

            <div class="mt-6 space-y-5">

                <label class="flex items-center justify-between">

                    <span class="text-sm text-sand-700">
                        Notificações
                    </span>

                    <input type="checkbox" checked>

                </label>

                <label class="flex items-center justify-between">

                    <span class="text-sm text-sand-700">
                        Relatórios automáticos
                    </span>

                    <input type="checkbox">

                </label>

            </div>

        </div>

    </div>

</div>
{% endblock %}
