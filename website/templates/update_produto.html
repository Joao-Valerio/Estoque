{% extends "base.html" %}

{% block title %}Editar Produto - StockBot{% endblock %}

{% block content %}
<div class="min-h-screen py-10 px-4">

    <div class="max-w-3xl mx-auto">

        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            
            <div class="flex items-center gap-4">
                
                <button 
                    onclick="window.history.back()" 
                    class="w-11 h-11 rounded-xl bg-white shadow-md hover:shadow-lg transition flex items-center justify-center border border-sand-200 hover:bg-sand-50"
                >
                    <ion-icon 
                        name="chevron-back" 
                        class="text-2xl text-sand-700"
                    ></ion-icon>
                </button>

                <div>
                    <h1 class="text-4xl font-bold text-sand-900">
                        Editar Produto
                    </h1>

                    <p class="text-sand-500 mt-1">
                        Atualize as informações do produto
                    </p>
                </div>

            </div>

        </div>

        <!-- Card -->
        <div class="bg-white rounded-3xl shadow-xl border border-sand-200 overflow-hidden">

            <!-- Top Banner -->
            <div class="h-3 bg-gradient-to-r from-orange-400 via-amber-400 to-yellow-300"></div>

            <div class="p-8">

                <form method="POST" class="space-y-6">
                    {% csrf_token %}

                    <!-- Campos -->
                    {% for field in form %}

                    <div>
                        <label class="block mb-2 text-sm font-semibold text-sand-700">
                            {{ field.label }}
                        </label>

                        {{ field }}

                        {% if field.errors %}
                        <div class="mt-2 text-red-500 text-sm">
                            {{ field.errors }}
                        </div>
                        {% endif %}
                    </div>

                    {% endfor %}

                    <!-- Buttons -->
                    <div class="flex items-center justify-end gap-4 pt-6">

                        <button
                            type="button"
                            onclick="window.history.back()"
                            class="px-5 py-3 rounded-xl border border-sand-300 text-sand-700 hover:bg-sand-100 transition"
                        >
                            Cancelar
                        </button>

                        <button
                            type="submit"
                            class="px-6 py-3 rounded-xl bg-sand-900 text-white font-semibold hover:bg-sand-800 transition shadow-lg hover:scale-[1.02]"
                        >
                            Salvar Alterações
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>
{% endblock %}
